## Chaos Mesh values for local k3d environment
## Minimal resource footprint for homelab use

controllerManager:
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  enableFilterNamespace: false

chaosDaemon:
  runtime: containerd
  socketPath: /run/k3s/containerd/containerd.sock
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

dashboard:
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  securityMode: false

dnsServer:
  create: false

prometheus:
  create: false
  serviceMonitor:
    enabled: true
    namespace: monitoring
