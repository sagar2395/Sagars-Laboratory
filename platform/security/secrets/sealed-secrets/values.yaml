## Sealed Secrets Helm Chart Values
## https://github.com/bitnami-labs/sealed-secrets/tree/main/helm/sealed-secrets

# Controller resources (minimal for local dev)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Metrics for Prometheus
metrics:
  serviceMonitor:
    enabled: true
    namespace: monitoring
