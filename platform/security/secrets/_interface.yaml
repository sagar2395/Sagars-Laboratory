# Secrets Management Provider Interface
# Encrypted secrets that can be safely stored in Git.
# Current implementations: sealed-secrets

name: security/secrets
description: Secrets management allowing encrypted secrets to be committed to version control.

provides:
  - Controller that decrypts sealed secrets into Kubernetes Secrets
  - SealedSecret CRD for encrypted secret storage
  - Public key for client-side encryption (kubeseal CLI)
  - Prometheus ServiceMonitor for operational metrics

requires:
  kubernetes_resources:
    - Namespace (sealed-secrets)
    - CRDs (sealedsecrets)
  ports:
    - 8080 (Controller API)
  dependencies: []

env_variables: {}

scripts:
  install.sh: "Install secrets controller via Helm"
  uninstall.sh: "Remove secrets controller and CRDs (existing secrets remain)"
  status.sh: "Show pods, SealedSecrets, and controller certificate status"

values:
  values.yaml: "Helm chart values including resource limits and metrics configuration"

conventions:
  - Secrets are encrypted client-side using the controller's public key
  - Encrypted SealedSecret manifests are safe to commit to Git
  - Controller decrypts SealedSecrets into standard Kubernetes Secrets in-cluster
  - kubeseal CLI must target the correct controller name and namespace
  - Prometheus ServiceMonitor must be enabled for monitoring

implementations:
  sealed-secrets:
    chart: sealed-secrets/sealed-secrets
    notes: "Default. Bitnami Sealed Secrets controller. One-way encryption using asymmetric keys — only the controller can decrypt."
