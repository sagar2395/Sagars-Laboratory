name: chaos-engineering
displayName: "Chaos Engineering"
description: "Failure injection with Chaos Mesh — pod kills, network delays, CPU/memory stress, partitions. Correlate chaos experiments with application metrics via Grafana dashboard."
category: reliability
prerequisites:
  platform:
    - ingress
    - monitoring/metrics
    - monitoring/grafana
  apps:
    - go-api
runtimes:
  - k3d
  - aks
  - eks
components:
  - name: chaos-mesh
    type: helm
    chart: chaos-mesh/chaos-mesh
    repo: https://charts.chaos-mesh.org
    version: "2.7.0"
    namespace: chaos-mesh
    valuesFile: values/chaos-mesh.yaml

  - name: pod-disruption-budgets
    type: manifest
    path: manifests/pod-disruption-budgets.yaml

  - name: chaos-experiments
    type: manifest
    path: manifests/chaos-experiments.yaml

  - name: chaos-dashboards
    type: grafana-dashboard
    path: dashboards/
    namespace: monitoring

explore:
  urls:
    - label: "Grafana Chaos Dashboard"
      url: "http://grafana.{{.DomainSuffix}}"
    - label: "Chaos Mesh Dashboard"
      url: "http://localhost:2333 (run port-forward first)"
  commands:
    - label: "Port-forward Chaos Mesh dashboard"
      command: "kubectl port-forward -n chaos-mesh svc/chaos-dashboard 2333:2333 &"
    - label: "List all active experiments"
      command: "kubectl get podchaos,networkchaos,stresschaos --all-namespaces"
    - label: "Run pod-kill experiment on go-api"
      command: "kubectl apply -f {{.ProjectRoot}}/scenarios/chaos-engineering/manifests/chaos-experiments.yaml -l experiment=pod-kill"
    - label: "Watch pod restarts during chaos"
      command: "watch kubectl get pods -n go-api -n echo-server"
    - label: "Generate traffic during chaos"
      command: "for i in $(seq 1 200); do curl -s -o /dev/null -w '%{http_code}\\n' http://go-api.{{.DomainSuffix}}/health; sleep 0.1; done"
    - label: "Delete all chaos experiments"
      command: "kubectl delete podchaos,networkchaos,stresschaos --all --all-namespaces"
    - label: "Check PDB status"
      command: "kubectl get pdb -n go-api -n echo-server"
  tips:
    - "Start by generating background traffic, then activate experiments to see their impact in Grafana"
    - "Pod kill experiments test self-healing — Kubernetes will restart terminated pods automatically"
    - "Network delay experiments simulate degraded connectivity — watch latency spike in Grafana"
    - "CPU stress triggers HPA scale-up if autoscaling is enabled — watch replica count increase"
    - "Memory stress can cause OOMKills — watch the OOMKill Events panel in the chaos dashboard"
    - "PDBs prevent all pods from being disrupted simultaneously — verify with: kubectl get pdb"
    - "Experiments are one-shot by default. For continuous chaos, create Schedules via the Chaos Dashboard UI"
    - "To run experiments selectively, apply with label selectors: kubectl apply -f manifests/chaos-experiments.yaml -l experiment=pod-kill"
