# Testing values for readiness failure scenarios

nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: go-api

deployment:
  replicaCount: 2

image:
  repository: go-api
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: go-api.k3d.local
      paths:
        - path: /
          pathType: Prefix

env:
  PORT: "8080"
  READINESS_FAILURE: "true"  # Simulates readiness check failure
  SHUTDOWN_TIMEOUT: "30s"

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

podAnnotations:
  scenario: "readiness-failure-testing"
