apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "echo-server.fullname" . }}-test-connection"
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "echo-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['--timeout=5', '-qO-', 'http://{{ include "echo-server.fullname" . }}.{{ .Values.namespace.name }}.svc.cluster.local:{{ .Values.service.port }}/health']
  restartPolicy: Never
