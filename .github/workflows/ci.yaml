# CI Pipeline — lint, test, build for all Go code
name: CI

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'apps/go-api/**'
      - 'apps/echo-server/**'
      - 'cmd/labctl/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/go-api/**'
      - 'apps/echo-server/**'
      - 'cmd/labctl/**'

env:
  GO_VERSION: '1.24'

jobs:
  lint-apps:
    name: Lint apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [go-api, echo-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go vet
        working-directory: apps/${{ matrix.app }}
        run: go vet ./...
      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          working-directory: apps/${{ matrix.app }}

  lint-cli:
    name: Lint CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go vet
        working-directory: cmd/labctl
        run: go vet ./...
      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          working-directory: cmd/labctl

  test-apps:
    name: Test apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [go-api, echo-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        working-directory: apps/${{ matrix.app }}
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.app }}
          path: apps/${{ matrix.app }}/coverage.out

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        working-directory: cmd/labctl
        run: go test -v -race ./internal/...
      - name: Build CLI
        run: |
          cp -r ui/dist/* cmd/labctl/ui/dist/
          cd cmd/labctl && go build -o /dev/null .

  build-images:
    name: Build images
    runs-on: ubuntu-latest
    needs: [lint-apps, test-apps]
    strategy:
      matrix:
        app: [go-api, echo-server]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: apps/${{ matrix.app }}
        run: |
          docker build -t ${{ matrix.app }}:${{ github.sha }} .
          docker tag ${{ matrix.app }}:${{ github.sha }} ${{ matrix.app }}:latest
      - name: Verify image
        run: docker images ${{ matrix.app }}

  helm-lint:
    name: Lint Helm charts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [go-api, echo-server]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint apps/${{ matrix.app }}/deploy/helm -f apps/${{ matrix.app }}/deploy/helm/values-dev.yaml
      - name: Template validation
        run: |
          helm template ${{ matrix.app }} apps/${{ matrix.app }}/deploy/helm \
            -f apps/${{ matrix.app }}/deploy/helm/values-dev.yaml \
            --namespace ${{ matrix.app }}
