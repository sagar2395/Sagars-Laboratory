# CD Pipeline Template for Lab Apps
# Demonstrates image build, push, and ArgoCD sync pattern
name: CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'apps/go-api/**'

env:
  APP_NAME: go-api
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/go-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ env.APP_NAME }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in Helm values
        run: |
          cd apps/${{ env.APP_NAME }}/deploy/helm
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" values-dev.yaml
          sed -i "s|repository:.*|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" values-dev.yaml

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps/${{ env.APP_NAME }}/deploy/helm/values-dev.yaml
          git diff --staged --quiet || git commit -m "chore: update ${{ env.APP_NAME }} image to ${{ github.sha }}"
          git push

  # ArgoCD will auto-sync when it detects the manifest change
  # This step optionally triggers an immediate sync
  notify-argocd:
    runs-on: ubuntu-latest
    needs: update-manifests
    if: false  # Enable this if you have ArgoCD API access from CI
    steps:
      - name: Trigger ArgoCD sync
        run: |
          # ArgoCD CLI sync (requires ARGOCD_AUTH_TOKEN secret)
          # argocd app sync ${{ env.APP_NAME }} --server argocd.example.com --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }}
          echo "ArgoCD will auto-sync via automated sync policy"
